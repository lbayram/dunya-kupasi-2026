<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 — Dashboard</title>
<style>
  :root{
    --bg:#0d1321; --panel:#161d2f; --panel2:#1c2540; --line:#2a3554;
    --text:#e8ecf5; --muted:#93a0bd; --accent:#ffd166; --green:#3ddc84;
    --red:#e63946; --tur:#ff5c39; --blue:#4cc9f0;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:"Segoe UI",Roboto,Arial,sans-serif;line-height:1.45}
  .wrap{max-width:1280px;margin:0 auto;padding:18px}

  header{background:linear-gradient(135deg,#13294b 0%,#1d3a6e 55%,#7a1f2b 100%);
    border-radius:16px;padding:26px 28px;margin-bottom:18px;position:relative;overflow:hidden}
  header::after{content:"⚽";position:absolute;right:18px;top:-14px;font-size:120px;opacity:.08}
  header h1{font-size:26px;letter-spacing:.5px}
  header .sub{color:#cdd8ee;margin-top:6px;font-size:14px}
  .badges{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
  .badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
    padding:4px 12px;border-radius:20px;font-size:12.5px}
  .headline{margin-top:14px;background:rgba(0,0,0,.28);border-left:4px solid var(--accent);
    padding:10px 14px;border-radius:8px;font-size:14.5px}
  .langsel{position:absolute;top:14px;right:16px;z-index:2}
  .langsel select{background:rgba(0,0,0,.35);color:var(--text);border:1px solid rgba(255,255,255,.25);
    border-radius:8px;padding:5px 8px;font-size:13px;cursor:pointer}

  section{margin-bottom:22px}
  h2{font-size:17px;margin-bottom:10px;display:flex;align-items:center;gap:8px;
     border-left:4px solid var(--accent);padding-left:10px;flex-wrap:wrap}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
  .muted{color:var(--muted);font-size:12.5px}

  .picker{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:12px}
  .picker label{font-size:13px;color:var(--muted)}
  .picker select{background:var(--panel2);color:var(--text);border:1px solid var(--line);
    border-radius:8px;padding:6px 8px;font-size:13px;max-width:180px}
  .picker button{background:transparent;color:var(--muted);border:1px solid var(--line);
    border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer}
  .picker button:hover{color:var(--text);border-color:var(--muted)}

  .favgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(235px,1fr));gap:12px}
  .fav{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;
       border-top:3px solid var(--blue)}
  .fav.tur{border-top-color:var(--tur);background:linear-gradient(180deg,#2a1620 0%,var(--panel) 40%)}
  .fav .head{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:700}
  .fav .grp{margin-left:auto;font-size:11.5px;background:var(--panel2);border:1px solid var(--line);
            padding:2px 8px;border-radius:10px;color:var(--muted)}
  .fav .status{margin-top:8px;font-size:13px;color:var(--accent)}
  .fav .next{margin-top:8px;font-size:13px}
  .fav .next b{color:var(--green)}
  .fav table{width:100%;margin-top:10px;border-collapse:collapse;font-size:12.5px}
  .fav td{padding:3px 2px;border-top:1px dashed var(--line);color:var(--muted)}
  .fav td:first-child{color:var(--text)}
  .fav .note{margin-top:8px;font-size:11.5px;color:var(--muted);font-style:italic}
  .favhint{font-size:12.5px;color:var(--muted);margin-top:8px}

  .matchrow{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;
    background:var(--panel2);border:1px solid var(--line);margin-bottom:8px;flex-wrap:wrap}
  .matchrow .time{font-weight:700;color:var(--accent);min-width:88px}
  .matchrow .grp{font-size:11px;background:#0d1321;padding:2px 8px;border-radius:8px;color:var(--muted)}
  .matchrow .teams{font-size:14.5px;font-weight:600}
  .matchrow .score{font-weight:800;color:var(--green);font-size:15px}
  .matchrow .venue{margin-left:auto;color:var(--muted);font-size:12px}
  .matchrow .mnote{width:100%;font-size:12px;color:var(--accent)}
  .matchrow.favmatch{border-color:var(--tur)}
  .resnote{font-size:12px;color:var(--muted);width:100%}

  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:900px){.twocol{grid-template-columns:1fr}}

  .scorers{width:100%;border-collapse:collapse;font-size:14px}
  .scorers th{font-size:12px;color:var(--muted);text-align:left;padding:6px 8px;border-bottom:1px solid var(--line)}
  .scorers td{padding:7px 8px;border-bottom:1px solid var(--line)}
  .scorers tr:last-child td{border-bottom:none}
  .scorers .g{font-weight:800;color:var(--accent);text-align:center}
  .crown{color:var(--accent)}

  .groups{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
  .gcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .gcard .gtitle{background:var(--panel2);padding:8px 12px;font-weight:700;font-size:14px;
    display:flex;justify-content:space-between}
  .gcard table{width:100%;border-collapse:collapse;font-size:12.5px}
  .gcard th{color:var(--muted);font-size:10.5px;padding:5px 4px;text-align:center;font-weight:600}
  .gcard td{padding:5px 4px;text-align:center;border-top:1px solid #202944}
  .gcard td.t{text-align:left;padding-left:10px;white-space:nowrap}
  .gcard tr.q1 td:first-child{border-left:3px solid var(--green)}
  .gcard tr.q3 td:first-child{border-left:3px solid var(--accent)}
  .gcard tr.q4 td:first-child{border-left:3px solid transparent}
  .gcard tr.favrow{background:rgba(255,92,57,.12)}
  .gcard td.pts{font-weight:800;color:var(--accent)}
  .legend{font-size:11.5px;color:var(--muted);margin-top:8px}
  .dotg{color:var(--green)} .dota{color:var(--accent)}

  .bracketwrap{overflow-x:auto;padding-bottom:8px}
  .bracket{display:flex;gap:18px;min-width:1150px}
  .round{display:flex;flex-direction:column;justify-content:space-around;gap:8px;flex:1}
  .round h3{font-size:12.5px;color:var(--muted);text-align:center;margin-bottom:2px}
  .bm{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:7px 9px;font-size:12px}
  .bm.tur{border-color:var(--tur);box-shadow:0 0 0 1px var(--tur)}
  .bm .mid{color:var(--muted);font-size:10px;display:flex;justify-content:space-between;margin-bottom:3px}
  .bm .tm{display:flex;justify-content:space-between;padding:1.5px 0}
  .bm.final{border-color:var(--accent);background:linear-gradient(180deg,#2b2410,var(--panel2))}
  .bm.final .mid{color:var(--accent)}
  .turpath{margin-top:10px;font-size:13px;background:rgba(255,92,57,.1);
    border:1px dashed var(--tur);border-radius:10px;padding:10px 14px}

  .facts li{margin:6px 0 6px 18px;font-size:13.5px}
  footer{color:var(--muted);font-size:11.5px;text-align:center;padding:14px 0 30px;border-top:1px solid var(--line)}
  footer a{color:var(--blue);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="langsel"><select id="langSel"></select></div>
    <h1>🏆 FIFA World Cup 2026</h1>
    <div class="sub" id="hSub"></div>
    <div class="badges">
      <span class="badge" id="bDay"></span>
      <span class="badge" id="bUpdate"></span>
      <span class="badge" id="bTz"></span>
    </div>
    <div class="headline" id="headline"></div>
  </header>

  <section>
    <h2 id="hFav"></h2>
    <div class="picker">
      <label id="pickLabel"></label>
      <select id="sel0"></select><select id="sel1"></select>
      <select id="sel2"></select><select id="sel3"></select>
      <button id="clearBtn"></button>
      <span class="muted" id="pickNote"></span>
    </div>
    <div class="favgrid" id="favgrid"></div>
  </section>

  <section>
    <h2 id="hResults"></h2>
    <div class="card" id="resultsBox"></div>
  </section>

  <div class="twocol">
    <section>
      <h2><span id="hToday"></span> <span class="muted" id="todayLabel"></span></h2>
      <div class="card" id="todayBox"></div>
    </section>

    <section>
      <h2 id="hScorers"></h2>
      <div class="card">
        <table class="scorers" id="scorersTbl">
          <thead><tr><th>#</th><th id="colP"></th><th id="colT"></th><th style="text-align:center" id="colG"></th></tr></thead>
          <tbody></tbody>
        </table>
        <div class="muted" id="scorersNote" style="margin-top:6px"></div>
      </div>
    </section>
  </div>

  <section>
    <h2 id="hGroups"></h2>
    <div class="groups" id="groupsBox"></div>
    <div class="legend" id="legendBox"></div>
  </section>

  <section>
    <h2 id="hBracket"></h2>
    <div class="bracketwrap card">
      <div class="bracket" id="bracketBox"></div>
    </div>
    <div class="turpath" id="turPath"></div>
  </section>

  <section id="factsSection">
    <h2 id="hFacts"></h2>
    <div class="card"><ul class="facts" id="factsBox"></ul></div>
  </section>

  <footer>
    <span id="footSrc"></span>: <a href="https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026">FIFA.com</a> ·
    <a href="https://www.espn.com/soccer/scoreboard/_/league/fifa.world">ESPN</a> ·
    <a href="https://www.skysports.com/football/news/11095/13481245/">Sky Sports</a>
    &nbsp;|&nbsp; <span id="footUpdate"></span> &nbsp;|&nbsp; <span id="footAuto"></span>
    <span id="visitBadge" style="display:none">&nbsp;|&nbsp; 👁 <span id="visitCount"></span></span>
  </footer>
</div>

<script src="data.js"></script>

/* ================= TİMEZONE HARİTASI ================= */
const LANG_TZ = {
  tr:"Europe/Istanbul", en:"Europe/London", fr:"Europe/Paris",
  es:"Europe/Madrid",   de:"Europe/Berlin", ja:"Asia/Tokyo"
};

/* ================= DİL DURUMU ================= */
const LKEY = "dk2026_lang";
let lang = localStorage.getItem(LKEY);
if (!LANGS[lang]) {
  const nav = (navigator.language || "tr").slice(0, 2);
  lang = LANGS[nav] ? nav : "tr";
}
let L = LANGS[lang];
let TZ = LANG_TZ[lang] || "Europe/Istanbul";

const tname = ad => lang === "tr" ? ad : (TEAM_I18N[ad] ? (TEAM_I18N[ad][lang] || TEAM_I18N[ad].en) : ad);
const trMonths = s => { let r = s; Object.entries(L.months).forEach(([k,v]) => r = r.split(k).join(v)); return r; };
const prose = (trText, enText) => lang === "tr" ? trText : (enText || trText);

/* ================= TAKIM KAYITLARI ================= */
const TEAMS = {};
Object.entries(D.groups).forEach(([g, rows]) =>
  rows.forEach(r => TEAMS[r.takim] = { flag: r.flag, group: g }));
const tkm = ad => TEAMS[ad] ? TEAMS[ad].flag + " " + tname(ad) : tname(ad);

/* Eleme ağacı etiketlerini çevir */
function bLabel(s) {
  let m;
  if ((m = s.match(/^([A-L]) 1\.si$/))) return L.g1(m[1]);
  if ((m = s.match(/^([A-L]) 2\.si$/))) return L.g2(m[1]);
  if ((m = s.match(/^M(\d+) galibi$/))) return L.win(m[1]);
  if ((m = s.match(/^3\. \((.+)\)$/))) return L.thd(m[1]);
  return TEAMS[s] ? tkm(s) : s;
}

/* ================= TARİH / SAAT YARDIMCILARI ================= */
/* iso = "YYYY-MM-DD" (TSİ tarihi), saat = "HH:MM" (TSİ saati) */
const toIsoDate = (d, tz) => new Intl.DateTimeFormat("en-CA", { timeZone: tz }).format(d);

/* TSİ saatini seçili dile göre dönüştür */
function saatStr(iso, saat) {
  const dt = new Date(`${iso}T${saat}:00+03:00`);
  return new Intl.DateTimeFormat("en-GB", {
    timeZone: TZ, hour: "2-digit", minute: "2-digit", hour12: false
  }).format(dt);
}

/* Bugünün tarih etiketini seçili TZ'ye göre döndür */
function todayLabel() {
  return new Intl.DateTimeFormat(L.locale, {
    timeZone: TZ, day: "numeric", month: "short", weekday: "long"
  }).format(new Date());
}

/* Maçın gün adını seçili TZ'de göster */
function gunAdi(iso, saat) {
  const d = new Date(`${iso}T${saat || "12:00"}:00+03:00`);
  return new Intl.DateTimeFormat(L.locale, {
    timeZone: TZ, day: "numeric", month: "short", weekday: "long"
  }).format(d);
}

/* Maçın kısa tarihini seçili TZ'de göster */
function gunKisa(iso, saat) {
  const d = new Date(`${iso}T${saat || "12:00"}:00+03:00`);
  return new Intl.DateTimeFormat(L.locale, {
    timeZone: TZ, day: "numeric", month: "short"
  }).format(d);
}

/* ================= FAVORİ SEÇİMİ ================= */
const KEY = "dk2026_favoriler";
let secim = [];
try { secim = JSON.parse(localStorage.getItem(KEY)) || []; } catch (e) {}
secim = secim.filter(t => TEAMS[t] && t !== "Türkiye").slice(0, 4);

function pickerKur() {
  const havuz = Object.keys(TEAMS).filter(t => t !== "Türkiye")
    .sort((a, b) => tname(a).localeCompare(tname(b), L.locale));
  for (let i = 0; i < 4; i++) {
    const s = $("sel" + i);
    const digerleri = secim.filter((_, j) => j !== i);
    s.innerHTML = `<option value="">${L.pickPh}</option>` +
      havuz.filter(t => !digerleri.includes(t))
        .map(t => `<option value="${t}" ${secim[i] === t ? "selected" : ""}>${TEAMS[t].flag} ${tname(t)}</option>`).join("");
    s.onchange = () => {
      secim[i] = s.value || undefined;
      secim = secim.filter(Boolean);
      try { localStorage.setItem(KEY, JSON.stringify(secim)); } catch (e) {}
      renderDynamic();
    };
  }
}
$("clearBtn").onclick = () => {
  secim = [];
  try { localStorage.setItem(KEY, "[]"); } catch (e) {}
  renderDynamic();
};

/* ================= BÖLÜM ÇİZİMLERİ ================= */
function takimKarti(ad) {
  const t = TEAMS[ad], g = t.group;
  const rows = D.groups[g];
  const idx = rows.findIndex(r => r.takim === ad);
  const me = rows[idx];
  const rakipler = rows.filter(r => r.takim !== ad).map(r => tname(r.takim)).join(", ");
  const maclar = D.fixtures.filter(f => f.ev === ad || f.dep === ad);
  const sonraki = maclar.find(f => !f.skor);
  const gd = (me.a - me.y > 0 ? "+" : "") + (me.a - me.y);
  const durum = me.o === 0 ? L.notPlayed : L.status(g, idx + 1, me, gd);
  const sonrakiTxt = sonraki
    ? `${tname(sonraki.ev === ad ? sonraki.dep : sonraki.ev)} — ${gunAdi(sonraki.iso, sonraki.saat)}, ${saatStr(sonraki.iso, sonraki.saat)} (${sonraki.yer})`
    : L.noNext;
  const noteTr = D.teamNotes[ad], noteEn = (D.teamNotesEn || {})[ad];
  const note = prose(noteTr, noteEn);
  return `
  <div class="fav ${ad === "Türkiye" ? "tur" : ""}">
    <div class="head"><span style="font-size:22px">${t.flag}</span> ${tname(ad)}
      <span class="grp">${L.grpWord(g)}</span></div>
    <div class="muted" style="margin-top:4px">${L.opp}${rakipler}</div>
    <div class="status">${durum}</div>
    <div class="next">${L.next}<b>${sonrakiTxt}</b></div>
    <table>${maclar.map(f => {
      const rakip = f.ev === ad ? f.dep : f.ev;
      const evMi = f.ev === ad ? "" : L.away;
      return `<tr><td>${tkm(rakip)}${evMi}</td><td>${gunKisa(f.iso, f.saat)} ${saatStr(f.iso, f.saat)}</td>
        <td style="text-align:right;${f.skor ? "color:var(--green);font-weight:700" : "color:var(--muted)"}">${f.skor ?? f.yer}</td></tr>`;
    }).join("")}</table>
    ${note ? `<div class="note">${note}</div>` : ""}
  </div>`;
}

function favMi(f) { const Ls = ["Türkiye", ...secim]; return Ls.includes(f.ev) || Ls.includes(f.dep); }
function grpEtiket(f) { return f.grup.length === 1 ? L.grpWord(f.grup) : f.grup; }
function notCevir(s) { return lang === "tr" ? s : s.replace(/^Goller:/, L.goals); }

function macSatiri(f) {
  return `<div class="matchrow ${favMi(f) ? "favmatch" : ""}">
    <span class="time">${saatStr(f.iso, f.saat)}</span><span class="grp">${grpEtiket(f)}</span>
    <span class="teams">${tkm(f.ev)} ${f.skor ? `<span class="score">${f.skor}</span>` : "—"} ${tkm(f.dep)}</span>
    <span class="venue">📍 ${f.yer}</span>
    ${favMi(f) ? `<span class="mnote">${L.favMatch}</span>` : ""}
    ${f.skor && f.not ? `<span class="resnote">${notCevir(f.not)}</span>` : ""}
  </div>`;
}

function renderDynamic() {
  /* Favoriler */
  const liste = ["Türkiye", ...secim];
  pickerKur();
  $("favgrid").innerHTML = liste.map(takimKarti).join("") +
    (secim.length < 4 ? `<div class="fav" style="display:flex;align-items:center;justify-content:center">
      <div class="favhint" style="text-align:center">${L.hint(4 - secim.length)}</div></div>` : "");

  /* Bugünün maçları */
  const todayIso = toIsoDate(new Date(), TZ);
  const tomorrowIso = toIsoDate(new Date(Date.now() + 864e5), TZ);
  const bugun = D.fixtures.filter(f => toIsoDate(new Date(`${f.iso}T${f.saat}:00+03:00`), TZ) === todayIso);
  const gece  = D.fixtures.filter(f => toIsoDate(new Date(`${f.iso}T${f.saat}:00+03:00`), TZ) === tomorrowIso && saatStr(f.iso, f.saat) <= "06:00");
  $("todayLabel").textContent = "· " + todayLabel();
  $("todayBox").innerHTML =
    (bugun.length ? bugun.map(macSatiri).join("") : `<div class="muted">${L.noToday}</div>`) +
    (gece.length ? `<div class="muted" style="margin:10px 0 6px">${L.tonight}</div>` + gece.map(macSatiri).join("") : "");

  /* Son sonuçlar */
  const biten = D.fixtures.filter(f => f.skor)
    .sort((a, b) => (b.iso + b.saat).localeCompare(a.iso + a.saat)).slice(0, 6);
  $("resultsBox").innerHTML = biten.length
    ? biten.map(f => `
      <div class="matchrow ${favMi(f) ? "favmatch" : ""}">
        <span class="time">${gunKisa(f.iso, f.saat)}</span>
        <span class="grp">${grpEtiket(f)}</span>
        <span class="teams">${tkm(f.ev)} <span class="score">${f.skor}</span> ${tkm(f.dep)}</span>
        ${f.not ? `<span class="resnote">${notCevir(f.not)}</span>` : ""}
      </div>`).join("")
    : `<div class="muted">${L.noResults}</div>`;

  /* Gol krallığı */
  document.querySelector("#scorersTbl tbody").innerHTML = D.topScorers.map((s, i) => `
    <tr><td>${i === 0 ? '<span class="crown">👑</span>' : s.sira}</td>
    <td>${s.oyuncu}</td><td>${s.flag} ${tname(s.takim)}</td><td class="g">${s.gol}</td></tr>`).join("");
  $("scorersNote").textContent = prose(D.topScorersNote, D.topScorersNote_en) || "";

  /* Gruplar */
  const favs = liste;
  $("groupsBox").innerHTML = Object.entries(D.groups).map(([g, rows]) => `
    <div class="gcard">
      <div class="gtitle"><span>${L.grpWord(g)}</span>
        <span class="muted">${rows.some(r => favs.includes(r.takim)) ? L.favTag : ""}</span></div>
      <table>
        <tr>${L.cols.map((c, i) => i === 0
          ? `<th style="text-align:left;padding-left:10px">${c}</th>` : `<th>${c}</th>`).join("")}</tr>
        ${rows.map((r, i) => `
          <tr class="${i < 2 ? "q1" : i === 2 ? "q3" : "q4"} ${favs.includes(r.takim) ? "favrow" : ""}">
            <td class="t">${r.flag} ${tname(r.takim)}${r.ev ? ` <span class="muted">${L.host}</span>` : ""}</td>
            <td>${r.o}</td><td>${r.g}</td><td>${r.b}</td><td>${r.m}</td>
            <td>${r.a}</td><td>${r.y}</td><td>${r.a - r.y > 0 ? "+" : ""}${r.a - r.y}</td>
            <td class="pts">${r.p}</td></tr>`).join("")}
      </table>
    </div>`).join("");
  $("legendBox").innerHTML = L.legend;

  /* Eleme ağacı */
  const mk = (m, cls = "") => `
    <div class="bm ${m.tur ? "tur" : ""} ${cls}">
      <div class="mid"><span>${L.match}${m.id}</span><span>${trMonths(m.tarih)} · ${m.yer}</span></div>
      <div class="tm"><span>${bLabel(m.ev)}</span>${m.skor ? `<b>${m.skor.split("-")[0]}</b>` : ""}</div>
      <div class="tm"><span>${bLabel(m.dep)}</span>${m.skor ? `<b>${m.skor.split("-")[1]}</b>` : ""}</div>
    </div>`;
  $("bracketBox").innerHTML = `
    <div class="round"><h3>${L.rounds[0]}</h3>${D.bracket.r32.map(m => mk(m)).join("")}</div>
    <div class="round"><h3>${L.rounds[1]}</h3>${D.bracket.r16.map(m => mk(m)).join("")}</div>
    <div class="round"><h3>${L.rounds[2]}</h3>${D.bracket.qf.map(m => mk(m)).join("")}</div>
    <div class="round"><h3>${L.rounds[3]}</h3>${D.bracket.sf.map(m => mk(m)).join("")}</div>
    <div class="round"><h3>${L.rounds[4]}</h3>${mk(D.bracket.final, "final")}
      <div class="muted" style="text-align:center;font-size:11px">${L.third}</div></div>`;
  $("turPath").innerHTML = L.turPath + prose(D.bracket.note, D.bracket.note_en);

  /* Bilgiler */
  const facts = lang === "tr" ? D.facts : (D.facts_en && D.facts_en.length ? D.facts_en : D.facts);
  $("factsBox").innerHTML = facts.map(f => `<li>${f}</li>`).join("");
}

  document.documentElement.lang = lang;
  $("hSub").textContent = L.sub;
  const start = new Date("2026-06-11T00:00:00+03:00");
  const day = Math.max(1, Math.floor((Date.now() - start) / 864e5) + 1);

}

/* ================= DİL SEÇİCİ ================= */
$("langSel").innerHTML = Object.entries(LANGS)
  .map(([k, v]) => `<option value="${k}" ${k === lang ? "selected" : ""}>${v.flag} ${v.name}</option>`).join("");
$("langSel").onchange = () => {
  lang = $("langSel").value;
  L = LANGS[lang];
  TZ = LANG_TZ[lang] || "Europe/Istanbul";
  try { localStorage.setItem(LKEY, lang); } catch (e) {}
  renderStatic(); renderDynamic();
};

renderStatic(); renderDynamic();

/* Ziyaretçi rozeti (GoatCounter) — yüklenemezse gizli kalır */
fetch("https://lbayram-dk2026.goatcounter.com/counter/TOTAL.json")
  .then(r => r.ok ? r.json() : null)
  .then(j => {
    if (j && j.count) {
      document.getElementById("visitCount").textContent = j.count;
      document.getElementById("visitBadge").style.display = "";
    }
  }).catch(() => {});
</script>
